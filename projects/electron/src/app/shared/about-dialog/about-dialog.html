<div class="dialog-header">
  <img ngSrc="qdb-downloader.png" width="72" height="72" alt="" priority />
  <div class="product-heading">
    <h2 mat-dialog-title>QDB Downloader</h2>
    <p class="version">Version {{ version }}</p>
  </div>
  <button matIconButton mat-dialog-close type="button" aria-label="Close About dialog">
    <mat-icon aria-hidden="true">close</mat-icon>
  </button>
</div>

<mat-dialog-content>
  <p class="description">
    Local-first desktop app for creating date-based football-data snapshots from Transfermarkt.
  </p>
  <p class="copyright">© {{ currentYear }} {{ author }} · MIT License</p>
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton mat-dialog-close type="button">Close</button>
  <div class="external-actions">
    <a
      matButton
      href="https://celtian.github.io/qdb-downloader/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Documentation (opens in the system browser)"
    >
      <mat-icon aria-hidden="true">menu_book</mat-icon>
      Documentation
    </a>
    <a
      matButton="filled"
      href="https://github.com/Celtian/qdb-downloader"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="GitHub (opens in the system browser)"
    >
      <mat-icon aria-hidden="true">code</mat-icon>
      GitHub
    </a>
  </div>
</mat-dialog-actions>
