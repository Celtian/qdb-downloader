<mat-sidenav-container>
  <mat-sidenav mode="side" opened>
    <div class="sidebar-content">
      <a class="brand" routerLink="/" aria-label="QDB Downloader projects">
        <mat-icon>storage</mat-icon>
        <span>QDB Downloader</span>
      </a>
      <nav aria-label="Project navigation">
        @for (link of links; track link.path) {
          <a
            matButton
            routerLinkActive="active"
            [routerLink]="link.path"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <mat-icon>{{ link.icon }}</mat-icon>
            {{ link.label }}
          </a>
        }
      </nav>
      <button class="about-action" matButton type="button" aria-label="About" (click)="openAbout()">
        <mat-icon aria-hidden="true">info</mat-icon>
        <span>About</span>
      </button>
    </div>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar>
      @if (project(); as activeProject) {
        <div>
          <strong>{{ activeProject.name }}</strong>
          <span>{{ activeProject.referenceDate | referenceDate }}</span>
        </div>
      } @else if (error()) {
        <span class="error" role="alert">{{ error() }}</span>
      } @else {
        <mat-progress-bar mode="indeterminate" aria-label="Loading project" />
      }
      <span class="spacer"></span>
      <a matButton routerLink="/"><mat-icon>arrow_back</mat-icon>Projects</a>
    </mat-toolbar>
    <main id="main-content" tabindex="-1"><router-outlet /></main>
  </mat-sidenav-content>
</mat-sidenav-container>
