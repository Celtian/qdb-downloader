<section class="settings-page" aria-labelledby="settings-title">
  <header>
    <p class="eyebrow">APPLICATION</p>
    <h1 id="settings-title">Settings</h1>
    <p>Customize how QDB Downloader looks and behaves.</p>
  </header>

  <mat-card appearance="outlined">
    <mat-card-content>
      <fieldset>
        <legend>Theme</legend>
        <p class="setting-description">Choose the appearance used throughout the application.</p>
        <mat-radio-group aria-label="Theme" [value]="theme.preference()">
          @for (option of themeOptions; track option.value) {
            <mat-radio-button
              [class.selected]="theme.preference() === option.value"
              [value]="option.value"
              (change)="selectTheme(option.value)"
            >
              <span class="theme-option">
                <mat-icon aria-hidden="true">{{ option.icon }}</mat-icon>
                <span>
                  <strong>{{ option.label }}</strong>
                  <small>{{ option.description }}</small>
                </span>
              </span>
            </mat-radio-button>
          }
        </mat-radio-group>
      </fieldset>
    </mat-card-content>
  </mat-card>
</section>
