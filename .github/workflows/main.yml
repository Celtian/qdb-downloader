name: 🚀 Build & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: ✅ Validate & Build
    runs-on: ubuntu-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔎 Verify tag targets master
        shell: bash
        run: |
          git fetch origin master
          test "$GITHUB_SHA" = "$(git rev-parse origin/master)"

      - name: 🔎 Verify package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: ✅ Validate source
        run: bun run validate

      - name: 📚 Build documentation
        run: bun run build:docs

      - name: 🛠️ Copy index.html to 404.html
        if: contains(github.ref, 'beta') == false
        shell: bash
        run: cp ./dist/docs/browser/index.html ./dist/docs/browser/404.html

      - name: 📚 Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: dist/docs/browser
          if-no-files-found: error

  windows:
    name: 🪟 Publish Windows x64
    needs: validate
    runs-on: windows-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: 🏗️ Build renderer
        run: bun run build:renderer

      - name: 📦 Package application
        run: bun run release:windows

      - name: 🔐 Create checksums
        shell: pwsh
        run: |
          $files = @(Get-ChildItem artifacts -File -Recurse)
          if (-not $files) { throw "Electrobun produced no artifacts." }
          $files | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -FilePath "$($_.FullName).sha256" -Encoding ascii
          }

      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 🪟 Windows installation

            1. Download `stable-win-x64-QDBDownloader-Setup.zip`.
            2. Extract the entire ZIP archive. Keep the `.installer` directory beside the EXE.
            3. Run `QDB Downloader-Setup.exe` from the extracted directory. Do not run it inside the ZIP.

            The installer is currently unsigned. Antivirus software or Windows SmartScreen may warn about it. Verify that the archive came from this release and compare its SHA-256 checksum before deciding whether to continue. Do not disable antivirus globally.

            If setup closes unexpectedly, open PowerShell in the extracted directory and run:

            ```powershell
            & '.\QDB Downloader-Setup.exe' *>&1 | Tee-Object installer.log
            ```

            Attach `installer.log` to a bug report.

            The `.tar.zst` and `update.json` files are used by Electrobun's update system and are not manual installers. Files ending in `.sha256` contain checksums for optional integrity verification.
          files: artifacts/**/*

  deploy-docs:
    name: 📚 Deploy GitHub Pages
    needs: [validate, windows]
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: dist/docs/browser

      - name: 🚀 Deploy Github Pages
        if: contains(github.ref, 'beta') == false
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_branch: gh-pages
          publish_dir: ./dist/docs/browser
