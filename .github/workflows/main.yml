name: 🚀 Build & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: ✅ Validate & Build
    runs-on: ubuntu-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔎 Verify tag targets master
        shell: bash
        run: |
          git fetch origin master
          test "$GITHUB_SHA" = "$(git rev-parse origin/master)"

      - name: 🔎 Verify package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"

      - name: 🗜️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: ✅ Validate source
        run: bun run validate

      - name: 🏗️ Build applications
        run: bun run build

      - name: 🔎 Verify build layout
        shell: bash
        run: |
          test -f dist/electron/browser/index.html
          test -f dist/docs/browser/index.html
          test -f .electron/electron/main.js
          test -f .electron/electron/preload.js

      - name: 🛠️ Copy index.html to 404.html
        shell: bash
        run: cp ./dist/docs/browser/index.html ./dist/docs/browser/404.html

      - name: 📚 Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: dist/docs/browser
          if-no-files-found: error

  windows:
    name: 🪟 Publish Windows x64
    needs: validate
    runs-on: windows-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v4

      - name: 🗜️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: 📦 Make Windows release
        run: bun run release:windows

      - name: 🔎 Verify release artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path 'out/make/squirrel.windows/x64/QDB-Downloader-Setup.exe')) { throw 'Squirrel Setup.exe is missing.' }
          if (-not (Get-ChildItem 'out/make/zip/win32/x64' -Filter '*.zip')) { throw 'Portable ZIP is missing.' }
          if (-not (Test-Path 'out/make/squirrel.windows/x64/RELEASES')) { throw 'Squirrel update metadata is missing.' }
          if (-not (Get-ChildItem 'out/make/squirrel.windows/x64' -Filter '*.nupkg')) { throw 'Squirrel update package is missing.' }

      - name: 🔐 Create checksums
        shell: pwsh
        run: |
          Get-ChildItem out/make -File -Recurse | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -FilePath "$($_.FullName).sha256" -Encoding ascii
          }

      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 🪟 Windows installation

            Download and run `QDB-Downloader-Setup.exe`, or download the ZIP for the portable build.

            This release is currently unsigned, so Windows SmartScreen or antivirus software may show a warning. Verify the release URL and the supplied SHA-256 checksum before deciding whether to continue. Do not disable antivirus globally.
          files: out/make/**/*

  deploy-docs:
    name: 📚 Deploy GitHub Pages
    needs: [validate, windows]
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: dist/docs/browser

      - name: 🚀 Deploy Github Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_branch: gh-pages
          publish_dir: ./dist/docs/browser
