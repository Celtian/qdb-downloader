name: 🚀 Build & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: ✅ Validate & Build
    runs-on: ubuntu-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔎 Verify tag targets master
        shell: bash
        run: |
          git fetch origin master
          test "$GITHUB_SHA" = "$(git rev-parse origin/master)"

      - name: 🔎 Verify package version
        shell: bash
        run: test "v$(node -p \"require('./package.json').version\")" = "$GITHUB_REF_NAME"

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: ✅ Validate source
        run: bun run validate

      - name: 📚 Build documentation
        run: bun run build:docs

      - name: 🛠️ Copy index.html to 404.html
        shell: bash
        run: cp dist/docs/browser/index.html dist/docs/browser/404.html

      - name: 📚 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/docs/browser

  windows:
    name: 🪟 Publish Windows x64
    needs: validate
    runs-on: windows-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: 🏗️ Build renderer
        run: bun run build:renderer

      - name: 📦 Package application
        run: bun run release:windows

      - name: 🔐 Create checksums
        shell: pwsh
        run: |
          $files = @(Get-ChildItem artifacts -File -Recurse)
          if (-not $files) { throw "Electrobun produced no artifacts." }
          $files | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -FilePath "$($_.FullName).sha256" -Encoding ascii
          }

      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  deploy-docs:
    name: 📚 Deploy GitHub Pages
    needs: [validate, windows]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v4
