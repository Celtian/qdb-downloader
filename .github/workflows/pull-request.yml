name: 🧪 Test PR

'on': pull_request

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: 🛠️ Validate & Build
    runs-on: ubuntu-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: 🧹 Check formatting
        run: bun run format:check

      - name: 🧹 Lint
        run: bun run lint

      - name: 🔎 Type check
        run: bun run typecheck

      - name: 🧪 Test with coverage
        run: bun run test:coverage

      - name: 🏗️ Build applications
        run: bun run build

      - name: 🔎 Verify documentation
        shell: bash
        run: test -f dist/docs/browser/index.html

      - name: 📚 Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: dist/docs/browser
          if-no-files-found: error

  package-windows:
    name: 🪟 Package Windows x64
    needs: validate
    runs-on: windows-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: 🏗️ Build renderer
        run: bun run build:renderer

      - name: 📦 Package application
        run: bun run release:windows

      - name: 🔎 Verify artifact layout
        shell: pwsh
        run: |
          $files = @(Get-ChildItem artifacts -File -Recurse)
          if (-not $files) { throw "Electrobun produced no artifacts." }
          if (-not ($files | Where-Object Extension -eq '.exe')) {
            throw "The Windows executable is missing."
          }
